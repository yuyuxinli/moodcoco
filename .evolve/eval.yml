dimensions:
  - name: file_verification
    description: 对话结束后文件写入正确性（字段存在、格式正确、内容从对话提炼）
    type: deterministic
    cmd: python3 .evolve/adapter.py check
    threshold: 10.0

  - name: behavior_correctness
    description: AI 回复行为是否符合 spec（触发条件、分支路径、禁止词、话术风格）
    type: llm-judged
    threshold: 9.0

  - name: scenario_coverage
    description: 测试场景本身是否真正覆盖了它声称验证的需求点
    type: llm-judged
    threshold: 9.0

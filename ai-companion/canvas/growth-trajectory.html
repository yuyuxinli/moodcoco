<!--
  Canvas 卡片 D：成长轨迹卡（Growth Trajectory）
  F07 节点 F（路径 F-2）使用，当 growth_tracker.py 返回 >=2 个 IM + macOS 桌面端时展示。
  Agent 根据 growth_tracker.py 的 JSON 输出填充模板变量，生成完整 HTML。

  模板变量说明：
    {card_title}       — 卡片标题，如"你走过的路"或"你说过的话"
    {im_nodes}         — IM 节点 HTML（重复 .im-node 块，从旧到新排列）
    {cta_text}         — CTA 按钮文案（如"你觉得这条线在往哪走？"）
    {cta_message}      — Deep Link 消息（URL 编码后的用户消息）

  IM 类型对应色标：
    Action              — #A8E6CF 薄荷（行为改变）
    Reflection          — #C5A3FF 薰衣草（从行动到反思）
    Protest             — #FFD4A2 杏黄（挑战旧信念）
    Re-conceptualization — #FF7F7F 珊瑚（重新定义自己）
    Performing Change   — #A8E6CF 薄荷加深（新场景新模式）

  遵循 canvas/design-guide.md 设计规范：
    - 暖白背景 #FFF8F0 / 暖灰文字 #8B7E74
    - 左侧渐变色带（杏黄→薄荷，表示成长方向）
    - 圆角 16px / 暖色阴影 / 触摸区域 >=44px
-->
<div class="canvas-card" style="background:#FFF8F0; border-radius:16px; padding:32px; max-width:600px; font-family:system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;">
  <h2 style="color:#8B7E74; font-size:18px; margin:0 0 24px 0; font-weight:500;">{card_title}</h2>

  <div class="growth-timeline" style="position:relative; margin:0 0 24px 0; padding-left:24px;">
    <!-- 左侧渐变色带：从杏黄到薄荷（从旧到新 = 从下到上方向的成长） -->
    <div style="position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(to top,#FFD4A2,#A8E6CF);border-radius:2px;"></div>

    <!-- IM 节点（agent 根据 growth_tracker.py 输出按时间从旧到新排列） -->
    <!-- 每个节点：
    <div class="im-node" style="margin-bottom:24px; position:relative;">
      <div style="width:10px;height:10px;border-radius:50%;background:{im_color};position:absolute;left:-27px;top:6px;"></div>
      <div style="color:#8B7E74;font-size:12px;">{日期}</div>
      <div style="background:white;border-radius:12px;padding:16px;margin-top:8px;box-shadow:0 2px 8px rgba(255,180,150,0.15);">
        <p style="color:#8B7E74;font-size:15px;margin:0 0 6px 0;">"{用户原话}"</p>
        <span style="color:{im_color};font-size:12px;">{IM 类型中文名}</span>
      </div>
    </div>
    -->
    {im_nodes}
  </div>

  <!-- CTA Deep Link 按钮 -->
  <div style="text-align:center; margin-top:20px;">
    <a class="cta-btn" href="openclaw://agent?message={cta_message}"
       style="display:inline-block;padding:12px 24px;background:#FF7F7F;color:white;border-radius:24px;text-decoration:none;font-size:15px;min-height:44px;line-height:20px;">
      {cta_text} →
    </a>
  </div>
</div>

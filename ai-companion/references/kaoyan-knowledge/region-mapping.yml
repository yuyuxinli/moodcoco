# A/B 区（一区/二区）省份映射
# 来源：教育部《全国硕士研究生招生工作管理规定》
# 说明：报考 A 区院校执行 A 区线，报考 B 区院校执行 B 区线
# 判定依据：院校所在省份（非考生户籍所在省份）

A:
  provinces:
    - 北京
    - 天津
    - 河北
    - 山西
    - 辽宁
    - 吉林
    - 黑龙江
    - 上海
    - 江苏
    - 浙江
    - 安徽
    - 福建
    - 江西
    - 山东
    - 河南
    - 湖北
    - 湖南
    - 广东
    - 重庆
    - 四川
    - 陕西
  count: 21

B:
  provinces:
    - 内蒙古
    - 广西
    - 海南
    - 贵州
    - 云南
    - 西藏
    - 甘肃
    - 青海
    - 宁夏
    - 新疆
  count: 10

# 使用方法：
# 1. 从 schools/{code}.yml 读取 school.province
# 2. 在本文件中查找该省份属于 A 还是 B
# 3. 用对应区域查 national-lines.yml
